services:
  # Python Backend Service
  - type: web
    name: zombie-attack-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./zombieware.db

  # React Frontend Static Site
  - type: static_site
    name: zombie-attack-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: zombie-attack-backend
          type: web
          property: url
