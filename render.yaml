databases:
  - name: zombieware-db
    databaseName: zombieware
    user: zombieware
    plan: free

services:
  - type: web
    name: zombie-attack
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zombieware-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: static_site
    name: zombie-attack-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: zombie-attack
          type: web
          property: url
