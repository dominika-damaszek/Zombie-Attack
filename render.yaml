# Backend uses Neon PostgreSQL only (see backend/database.py). Create a Neon project,
# copy the connection string, and set NEON_DATABASE_URL in the Render dashboard for
# the zombie-attack service (Blueprint sync: false means you paste the secret once).
services:
  - type: web
    name: zombie-attack
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: NEON_DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: static_site
    name: zombie-attack-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://zombie-attack.onrender.com
