services:
  # Python Backend Service
  - type: web
    name: zombie-attack-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./zombieware.db # Change this if using an external DB

  # React Frontend Static Site
  - type: static_site
    name: zombie-attack-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        # This will automatically use the URL of the backend service created above
        fromService:
          name: zombie-attack-backend
          type: web
          property: host
