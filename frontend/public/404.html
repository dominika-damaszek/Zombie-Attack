<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA fallback: store the path and redirect to /
      // The main app reads sessionStorage on load and navigates there
      var path = window.location.pathname + window.location.search;
      sessionStorage.setItem('spa_redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
